[module]
id           = "forum"
display_name = "Forum"
version      = "0.1.3"
description  = "Discussion boards: categories, forums, topics and posts with moderation, ranks and per-forum permissions (inspired by phpBB)"
author       = "Kubuno Contributors"
license      = "AGPL-3.0"
runtime      = "rust"
settings_path = "/forum/settings"

[process]
entrypoint = "kubuno-forum"
args       = []

[server]
host = "127.0.0.1"
port = 3117

[routes]
patterns = [
    { method = "*", path = "/*" },
]

[[sidebar_items]]
id       = "forum"
label    = "Forum"
icon     = "MessagesSquare"
path     = "/forum"
position = 24
section  = "main"

[events]
subscribed = [
    "UserDeleted",
]
publishes = [
    "ForumTopicCreated",
    "ForumPostCreated",
    "ForumPostUpdated",
    "ForumPostDeleted",
    "ForumReported",
]
